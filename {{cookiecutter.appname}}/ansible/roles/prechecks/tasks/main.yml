---
- name: Check OS is supported
  fail:
    msg: "OS {{ ansible_facts['distribution'] }} is not supported. Supported: {{ prechecks_supported_os }}"
  when: ansible_facts['distribution'] not in prechecks_supported_os

- name: Check SELinux is disabled (RedHat family)
  block:
    - name: Get SELinux status
      command: getenforce
      register: selinux_status
      changed_when: false
      failed_when: false

    - name: Fail if SELinux is not disabled
      fail:
        msg: "SELinux must be disabled. Current status: {{ selinux_status.stdout }}"
      when: selinux_status.stdout | lower != 'disabled'
  when: ansible_facts['os_family'] == 'RedHat'

- name: Check Firewalld is disabled (RedHat family)
  service:
    name: firewalld
    state: stopped
    enabled: false
  become: true
  when: ansible_facts['os_family'] == 'RedHat'
  failed_when: false

- name: Get Python version
  command: python3 --version
  register: python_version
  changed_when: false
  failed_when: false

- name: Check Python version is 3.6+
  fail:
    msg: "Python 3.6+ is required, found {{ python_version.stdout | default('not installed') }}"
  when:
    - python_version.rc != 0
    - python_version.stdout is not match("Python 3\\.[6-9]")

- name: Check Python packages are installed
  package:
    name: "{{ prechecks_python_packages }}"
    state: present
  become: true
  register: python_packages_result
  failed_when: false

- name: Get Docker version
  command: docker --version
  register: docker_version
  changed_when: false
  failed_when: false

- name: Check Docker is installed
  fail:
    msg: "Docker is not installed. Please install Docker first: curl -fsSL https://get.docker.com | sh"
  when: docker_version.rc != 0

- name: Get Docker service status
  service:
    name: docker
    state: started
  become: true
  failed_when: false
  when: docker_version.rc == 0

- name: Get Docker server version
  shell: "docker info 2>/dev/null | grep 'Server Version' | awk '{print $NF}' || echo 'error'"
  register: docker_server_version
  changed_when: false
  failed_when: false
  when: docker_version.rc == 0

- name: Check Docker Compose is installed (optional)
  command: docker-compose --version
  register: docker_compose_version
  changed_when: false
  failed_when: false

- name: Docker info
  debug:
    msg: |
      OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
      Python: {{ python_version.stdout | default('N/A') }}
      Docker: {{ docker_version.stdout | default('Not installed') }}
      Docker Compose: {{ docker_compose_version.stdout | default('Not installed') }}
